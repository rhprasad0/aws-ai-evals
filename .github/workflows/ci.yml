name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip jsonschema

      - name: Validate schemas, fixtures, and datasets
        run: python scripts/validate_dataset.py

      - name: Scan public artifacts
        run: python scripts/public_safety_scan.py

      - name: Run unit tests
        run: |
          python tests/test_schema_fixtures.py
          python tests/test_validate_dataset.py
          python tests/test_eval_harness.py
          python tests/test_label_workbench.py
          python tests/test_public_safety_scan.py
          python tests/test_profile_specimen.py
          python tests/test_run_profile_specimen.py
          python tests/test_dataset_workbench.py

      - name: Check whitespace errors
        run: git diff --check
